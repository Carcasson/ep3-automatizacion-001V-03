---
- name: Aprovisionamiento corporativo CSR1kv
  hosts: routers
  gather_facts: no
  vars_files:
    - ../vars/vars_001V-03.yaml
  tasks:
    - name: Respaldar running-config (antes de cualquier cambio)
      cisco.ios.ios_command:
        commands: show running-config
      register: backup_cfg

    - name: Guardar respaldo en archivo
      copy:
        content: "{{ backup_cfg.stdout[0] }}"
        dest: "respaldo/backup_{{ codigo }}.cfg"
      delegate_to: localhost

    - name: Habilitar NETCONF y RESTCONF y HTTPS
      cisco.ios.ios_config:
        lines:
          - netconf-yang
          - restconf
          - ip http secure-server

    - name: Configurar hostname corporativo
      cisco.ios.ios_config:
        lines:
          - "hostname {{ cliente.hostname }}"

    - name: Configurar banner de acceso
      cisco.ios.ios_config:
        lines:
          - "banner motd ^{{ router.banner }}^"

    - name: Configurar servidor NTP
      cisco.ios.ios_config:
        lines:
          - "ntp server {{ router.ntp_server }}"

    - name: Configurar descripcion interfaz WAN (GigabitEthernet1)
      cisco.ios.ios_config:
        lines:
          - "description {{ router.descripcion_wan }}"
        parents: interface GigabitEthernet1

    - name: Crear interfaz Loopback de gestion
      cisco.ios.ios_config:
        lines:
          - "ip address {{ router.loopback_ip }} {{ router.loopback_mask }}"
        parents: "interface Loopback{{ router.loopback_id }}"
